<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography — Rithesh Murthy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
        }
        header {
            padding: 2rem 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: baseline;
            gap: 1.5rem;
        }
        header h1 { font-size: 1.5rem; font-weight: 700; }
        header a {
            font-size: 0.9rem;
            color: #2563eb;
            text-decoration: none;
        }
        header a:hover { text-decoration: underline; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
            padding: 1rem 2rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .grid img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 8px;
            display: block;
            transition: opacity 0.2s;
        }
        .grid img:hover { opacity: 0.92; }
        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; padding: 1rem; }
            header { padding: 1.5rem 1rem 0.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Photography</h1>
        <a href="/#life">&larr; Back to ritheshrn.com</a>
    </header>
    <div class="grid">
        <img src="images/photogrphy/IMG_0020.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_0118.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_0140.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_0548.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_3318.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_3349.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_3797.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_4543.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_4910.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_5801.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_6630.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_8732.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_9316.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_9755.jpg" alt="Photography" loading="lazy">
        <img src="images/photogrphy/IMG_9877.jpg" alt="Photography" loading="lazy">
    </div>
</body>
</html>
